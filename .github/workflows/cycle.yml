name: VastoWorm Hourly Cycle

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history for commit analysis

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Hourly Cycle
        run: node src/index.js --before="${{ github.event.before }}" --after="${{ github.event.after }}" --event="${{ github.event_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json assets/virus.svg README.md
          if ! git diff --cached --quiet; then
            git commit -m "🧬 [VastoWorm] cycle auto-update [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
